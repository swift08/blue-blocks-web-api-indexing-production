name: Deploy to blueblocks.in (LIVE)

on:
  push:
    branches:
      - live

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Next.js (Static Export)
        run: npm run build

      - name: Verify export output
        run: |
          echo "PWD: $(pwd)"
          ls -la
          if [ ! -d "out" ]; then
            echo "ERROR: out/ is missing. Check next.config output='export' and remove unsupported server-only routes."
            exit 1
          fi
          ls -la out
          find out -maxdepth 2 -name "index.html" -print

      - name: Deploy to cPanel via FTPS (LIVE)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CPANEL_LIVE_FTP_SERVER }}
          username: ${{ secrets.CPANEL_LIVE_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_LIVE_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: out/
          server-dir: ./
