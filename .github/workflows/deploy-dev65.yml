name: Deploy to cPanel dev65 (staging)

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # If next.config.js uses output: "export", next build generates /out
      - name: Build (Static Export)
        run: npm run build

      - name: Verify export output
        run: |
          echo "PWD: $(pwd)"
          ls -la
          if [ ! -d "out" ]; then
            echo "ERROR: out/ is missing. Check next.config output='export' and remove unsupported server-only routes."
            exit 1
          fi
          ls -la out
          find out -maxdepth 2 -name "index.html" -print

      - name: Deploy to cPanel via FTP (dev65)
        uses: samkirkland/ftp-deploy-action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          local-dir: out/
          server-dir: ./
